filebeat.inputs:

- type: filestream
  id: my-system-logs
  enabled: true
  paths:
    - /var/log/**/*.log
  tags: ["varlog"]
  
output.kafka:
  hosts: ["IP:9092"]
  topic: "kafka-logs"

  ssl:
    enabled: true
    certificate_authorities: ["/etc/filebeat/certs/ca.crt"]
    verification_mode: none
  
